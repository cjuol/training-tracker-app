name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  tests:
    name: Tests (PHP 8.4)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: training_tracker_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: "!ChangeMe!"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl, zip, opcache
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=no

      - name: Run PHPStan
        run: |
          php bin/console cache:warmup --env=dev
          vendor/bin/phpstan analyse --memory-limit=256M

      - name: Run tests
        env:
          DATABASE_URL: postgresql://app:!ChangeMe!@127.0.0.1:5432/training_tracker_test?serverVersion=16&charset=utf8
          APP_ENV: test
        run: |
          php bin/console doctrine:database:create --env=test
          php bin/console doctrine:migrations:migrate --no-interaction --env=test
          php bin/console doctrine:fixtures:load --no-interaction --env=test
          vendor/bin/phpunit
